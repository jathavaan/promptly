name: Feature request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: ["jathavaan"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. Please describe the problem first, then your proposed solution.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem are you trying to solve? Avoid jumping straight to a solution.
      placeholder: When I have many tags, finding one in the autocomplete is slow because there is no fuzzy match.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? UX details, API shape, behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Who benefits and how often does this come up for you?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Best guess at where the change lives.
      options:
        - UI / UX
        - Tag editor
        - Prompt generation / copy
        - Library / saved prompts
        - Performance
        - Accessibility
        - Other / unsure
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups or references
      description: Screenshots, sketches, or links to similar features in other tools.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
