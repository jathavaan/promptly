name: Bug report
description: Report something that is broken or behaves incorrectly
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: ["jathavaan"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so the issue can be reproduced quickly.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am using the latest version deployed at the project URL (or `main`).
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: Copying a generated prompt strips newlines on Firefox.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered list. Be specific.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Brave
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: e.g. 124.0.6367.91
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other (specify in additional context)
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Drag and drop images or video. Optional but very helpful.
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser devtools console.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — related issues, recent changes, workarounds tried.
    validations:
      required: false
